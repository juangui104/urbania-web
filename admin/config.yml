backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

locale: 'es'

collections:
  - name: "proyectos"
    label: "Proyectos"
    folder: "_proyectos"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre del proyecto", name: "title", widget: "string"}
      - {label: "Categoría", name: "categoria", widget: "select",
         options: ["Obra nueva", "Remodelación", "Acabados e interiorismo",
                   "Diseños y estudios técnicos"]}
      - {label: "Ubicación", name: "ubicacion", widget: "string",
         default: "Medellín, Colombia"}
      - {label: "Año", name: "año", widget: "string"}
      - {label: "Imagen principal", name: "imagen_principal",
         widget: "image"}
      - {label: "Descripción", name: "descripcion", widget: "text"}
      - {label: "Galería de imágenes", name: "galeria",
         widget: "list", field: {label: "Imagen", name: "imagen",
         widget: "image"}}
      - {label: "Destacado en inicio", name: "destacado",
         widget: "boolean", default: false}

  - name: "blog"
    label: "Blog"
    folder: "_blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Categoría", name: "categoria", widget: "select",
         options: ["Remodelación", "Obra nueva", "Interiorismo",
                   "Consejos", "Presupuesto", "Materiales"]}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen destacada", name: "imagen", widget: "image"}
      - {label: "Extracto", name: "extracto", widget: "text"}
      - {label: "Contenido", name: "body", widget: "markdown"}
      - {label: "Publicado", name: "publicado", widget: "boolean",
         default: true}

  - name: "configuracion"
    label: "Configuración del sitio"
    files:
      - label: "Información general"
        name: "general"
        file: "_config/general.yml"
        fields:
          - {label: "Teléfono WhatsApp", name: "whatsapp",
             widget: "string"}
          - {label: "Email de contacto", name: "email",
             widget: "string"}
          - {label: "Instagram", name: "instagram", widget: "string"}
          - {label: "Facebook", name: "facebook", widget: "string"}
          - {label: "Dirección", name: "direccion", widget: "string"}
